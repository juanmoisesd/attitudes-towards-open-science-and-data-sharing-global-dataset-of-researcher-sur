name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          data/analysis_ready/dataset.csv
          checksums.sha256
        body_path: RELEASE_NOTES.md
